name: Cleanup PR Preview Pages

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: pr-preview-pages-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        id: checkout_gh_pages
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        if: ${{ steps.checkout_gh_pages.outcome == 'success' }}
        shell: bash
        run: |
          TARGET="pr-preview/pr-${{ github.event.pull_request.number }}"

          if [ ! -d "$TARGET" ]; then
            echo "No preview directory found: $TARGET"
            exit 0
          fi

          rm -rf "$TARGET"

          if [ -d pr-preview ] && [ -z "$(ls -A pr-preview)" ]; then
            rmdir pr-preview
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Remove PR preview #${{ github.event.pull_request.number }}"
          git push
