name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute base path
        id: base_path
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Disable app/api for static export
        run: |
          if [ -d app/api ]; then
            mv app/api .app-api-disabled-for-pages
          fi

      - name: Build static site
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base_path.outputs.value }}
          NEXT_PUBLIC_ENABLE_SPOT_SEARCH: '0'
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
