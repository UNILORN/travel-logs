name: PR Preview Pages

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pr-preview-pages-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute preview base path
        id: preview
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            SITE_BASE=""
          else
            SITE_BASE="/$REPO"
          fi

          PREVIEW_DIR="_preview/pr-${{ github.event.pull_request.number }}"
          PREVIEW_PATH="${SITE_BASE}/${PREVIEW_DIR}"

          echo "preview_path=$PREVIEW_PATH" >> "$GITHUB_OUTPUT"

      - name: Disable app/api for static export preview
        run: |
          if [ -d app/api ]; then
            mv app/api .app-api-disabled-for-pages-preview
          fi

      - name: Build static preview
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          GITHUB_PAGES_PR_PREVIEW: '1'
          NEXT_PUBLIC_GITHUB_PAGES_PR_PREVIEW: '1'
          NEXT_PUBLIC_ENABLE_SPOT_SEARCH: '0'
          NEXT_PUBLIC_BASE_PATH: ${{ steps.preview.outputs.preview_path }}
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const marker = '<!-- pr-preview-pages -->'
            const body = [
              marker,
              `✅ PR Preview (GitHub Pages): ${process.env.PREVIEW_URL}`,
              '',
              '制約: GitHub Pages は静的配信のため、このプレビューでは新規旅作成とスポット検索APIを無効化しています。',
            ].join('\n')

            const issue_number = context.issue.number
            const { owner, repo } = context.repo
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
